identity:
  author: stormxx
  name: nano_banana
  label:
    en_US: Nano Banana Image Generator
    zh_Hans: Nano Banana 图片生成器
  description:
    en_US: Generate and edit images using Google Gemini's Nano Banana models, including Nano Banana 2 and Nano Banana Pro.
    zh_Hans: 使用 Google Gemini 的 Nano Banana 系列模型生成和编辑图片，包括 Nano Banana 2 和 Nano Banana Pro。
  icon: icon.svg
  tags:
    - image
credentials_for_provider:
  gemini_api_key:
    type: secret-input
    required: true
    label:
      en_US: Gemini API Key
      zh_Hans: Gemini API Key
    placeholder:
      en_US: Please enter your Google Gemini API Key
      zh_Hans: 请输入你的 Google Gemini API Key
    help:
      en_US: Get your API key from Google AI Studio
      zh_Hans: 从 Google AI Studio 获取你的 API Key
    url: https://aistudio.google.com/apikey
tools:
  - tools/generate_image.yaml
  - tools/edit_image.yaml
extra:
  python:
    source: provider/nano_banana.py
